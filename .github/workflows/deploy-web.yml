name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6"

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import Project
        run: |
          godot --headless --editor --quit 2>/dev/null || true
          sleep 5

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Cache-bust exported assets
        run: |
          # Godot bakes the .pck filename into the .wasm binary, so we
          # cannot rename .pck or .wasm files. Instead, inject a version
          # query string into the JS loader so browsers fetch fresh assets.
          HASH=$(git rev-parse --short HEAD)
          cd build/web
          # Add cache-bust query param to .pck and .wasm URLs in the JS
          for f in *.js; do
            [ -f "$f" ] || continue
            sed -i "s|\.pck|.pck?v=${HASH}|g" "$f"
            sed -i "s|\.wasm|.wasm?v=${HASH}|g" "$f"
          done
          # Cache-bust all JS/CSS/PNG references in index.html
          for f in *.js; do
            [ -f "$f" ] || continue
            sed -i "s|${f}|${f}?v=${HASH}|g" index.html
          done
          for f in *.css; do
            [ -f "$f" ] || continue
            sed -i "s|${f}|${f}?v=${HASH}|g" index.html
          done
          for f in *.png; do
            [ -f "$f" ] || continue
            sed -i "s|${f}|${f}?v=${HASH}|g" index.html
          done
          cd ../..

      - name: Add coi-serviceworker
        run: |
          # Godot 4 HTML5 exports need SharedArrayBuffer, which requires
          # cross-origin isolation headers. GitHub Pages doesn't support
          # custom headers, so we use a service worker workaround.
          wget -q https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js \
            -O build/web/coi-serviceworker.min.js

          HASH=$(git rev-parse --short HEAD)
          # Inject the service worker script into the HTML before </head>
          # Also add no-cache meta tags to prevent stale HTML
          # The SW script also gets a cache-bust query string
          sed -i "s|</head>|<meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"/><meta http-equiv=\"Pragma\" content=\"no-cache\"/><meta http-equiv=\"Expires\" content=\"0\"/><script src=\"coi-serviceworker.min.js?v=${HASH}\"></script></head>|" build/web/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
